services:
  - type: web
    name: Exam-Saarthi
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn loginproject.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: exam-saarthi-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ALLOWED_HOSTS
        value: "examsaarthi.com,www.examsaarthi.com,examsaarthi.onrender.com,*.onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://examsaarthi.com,https://www.examsaarthi.com,https://examsaarthi.onrender.com"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: PORT
        value: "8000"

  - type: worker
    name: Exam-Saarthi-Migrations
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      python manage.py migrate --noinput
      echo "from django.contrib.auth import get_user_model; User = get_user_model(); user, created = User.objects.get_or_create(username='admin', defaults={'email':'gs8901346287@gmail.com','first_name':'Gourav','last_name':'Saini','is_superuser':True,'is_staff':True}); user.set_password('Gourav@2005to2026'); user.save(); print('✅ Superuser created successfully!' if created else '✅ User updated successfully!')" | python manage.py shell
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: exam-saarthi-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: exam-saarthi-db
    plan: free
    databaseName: exam_saarthi_db
